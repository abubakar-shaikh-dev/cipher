<style>
:root {
  --bg: #0a0a0f;
  --surface: #0f0f1a;
  --surface2: #131320;
  --border: #1e1e35;
  --border-active: #3d3d6b;
  --accent: #6c63ff;
  --accent2: #00d4aa;
  --danger: #ff4d6d;
  --text: #e8e8f0;
  --muted: #5a5a7a;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px 80px;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(108,99,255,0.055) 0%, transparent 70%);
  top: -250px; left: -250px;
  pointer-events: none; z-index: 0;
}
.container { width: 100%; max-width: 780px; position: relative; z-index: 1; }

/* Header */
.header { margin-bottom: 40px; }
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--accent2); background: rgba(0,212,170,0.08); border: 1px solid rgba(0,212,170,0.2);
  padding: 4px 10px; border-radius: 2px; margin-bottom: 14px;
}
.badge::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent2); animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
h1 {
  font-family: var(--sans); font-size: clamp(28px,4vw,40px);
  font-weight: 800; line-height: 1.1; letter-spacing: -0.02em;
}
h1 span { color: var(--accent); }
.subtitle { font-size: 12px; color: var(--muted); margin-top: 8px; letter-spacing: 0.03em; }
.byline {
  display: inline-block; margin-top: 10px; font-size: 11px; color: var(--accent);
  text-decoration: none; letter-spacing: 0.05em; opacity: .65; transition: opacity .15s;
}
.byline:hover { opacity: 1; }

/* Toolbar */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px; margin-bottom: 20px;
}
.mode-toggle {
  display: flex; background: var(--surface);
  border: 1px solid var(--border); border-radius: 4px; padding: 4px;
}
.mode-btn {
  padding: 8px 20px; border: none; background: none; color: var(--muted);
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
  border-radius: 2px; transition: all .15s;
}
.mode-btn.active { background: var(--accent); color: #fff; }
.mode-btn:not(.active):hover { color: var(--text); }
.toolbar-right { display: flex; gap: 8px; align-items: center; }
.encoding-toggle {
  display: flex; background: var(--surface);
  border: 1px solid var(--border); border-radius: 4px; padding: 3px;
}
.enc-btn {
  padding: 5px 12px; border: none; background: none; color: var(--muted);
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
  border-radius: 2px; transition: all .15s;
}
.enc-btn.active { background: rgba(108,99,255,.2); color: var(--accent); }
.enc-btn:not(.active):hover { color: var(--text); }
.btn-clear {
  padding: 7px 13px; background: none; border: 1px solid var(--border); border-radius: 3px;
  color: var(--muted); font-family: var(--mono); font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all .15s;
}
.btn-clear:hover { border-color: var(--danger); color: var(--danger); }

/* Card */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.card-header {
  padding: 13px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--muted);
}
.card-header .dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-red{background:#ff5f56} .dot-yellow{background:#ffbd2e} .dot-green{background:#27c93f}
.field-group { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.field { display: flex; flex-direction: column; gap: 7px; }
label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--muted);
  display: flex; align-items: center; gap: 8px;
}
label .hint { font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 10px; color: #3a3a5a; }
input, textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-family: var(--mono);
  font-size: 13px; padding: 11px 14px; outline: none;
  transition: border-color .15s; resize: vertical;
}
input:focus, textarea:focus { border-color: var(--accent); }
input::placeholder, textarea::placeholder { color: #2a2a4a; }
textarea { min-height: 88px; line-height: 1.6; }

/* Key row */
.key-row { display: flex; gap: 8px; align-items: stretch; }
.key-wrapper { position: relative; flex: 1; }
.key-wrapper input { padding-right: 92px; }
.key-status {
  position: absolute; right: 38px; top: 50%; transform: translateY(-50%);
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 2px;
}
.key-status.valid   { color: var(--accent2); background: rgba(0,212,170,.1); }
.key-status.invalid { color: var(--danger);  background: rgba(255,77,109,.1); }
.key-eye {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--muted);
  padding: 4px; display: flex; align-items: center; transition: color .15s;
}
.key-eye:hover { color: var(--text); }
.btn-gen {
  padding: 0 14px; background: rgba(108,99,255,.1); border: 1px solid rgba(108,99,255,.25);
  border-radius: 4px; color: var(--accent); font-family: var(--mono); font-size: 10px;
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
  white-space: nowrap; transition: all .15s; display: flex; align-items: center; gap: 5px;
}
.btn-gen:hover { background: rgba(108,99,255,.2); }

/* Textarea + counter */
.textarea-wrapper { position: relative; }
.char-count {
  position: absolute; bottom: 8px; right: 10px;
  font-size: 9px; color: #2e2e50; letter-spacing: 0.05em; pointer-events: none;
}

/* Run button */
.btn-run {
  width: 100%; padding: 13px; background: var(--accent); border: none;
  border-radius: 4px; color: white; font-family: var(--mono); font-size: 12px;
  font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
  transition: all .15s; display: flex; align-items: center; justify-content: center;
  gap: 8px; position: relative; overflow: hidden;
}
.btn-run::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.1), transparent);
  transform: translateX(-100%); transition: transform .4s ease;
}
.btn-run:hover { background: #7c74ff; }
.btn-run:hover::after { transform: translateX(100%); }
.btn-run:active { transform: scale(.99); }
.btn-run:disabled { opacity: .45; cursor: not-allowed; transform: none; }
.spinner {
  width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .6s linear infinite; display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn-run.loading .spinner { display: block; }
.btn-run.loading .btn-label { opacity: .6; }
.shortcut-hint { text-align: right; font-size: 9px; color: #2a2a45; letter-spacing: 0.08em; margin-top: -8px; }

/* Divider */
.divider { display: flex; align-items: center; gap: 12px; padding: 0 20px; }
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-label { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }

/* Output */
.output-section {
  opacity: 0; transform: translateY(6px); transition: all .25s ease;
  pointer-events: none; height: 0; overflow: hidden;
}
.output-section.visible {
  opacity: 1; transform: translateY(0); pointer-events: all; height: auto; overflow: visible;
}
.output-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
.output-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
.output-actions { display: flex; gap: 6px; }
.out-btn {
  padding: 4px 10px; border-radius: 3px; font-family: var(--mono); font-size: 10px;
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
  transition: all .15s; border: 1px solid var(--border); background: var(--surface2); color: var(--muted);
}
.out-btn:hover { color: var(--text); border-color: var(--border-active); }
.out-btn.copy-success { color: var(--accent2); border-color: rgba(0,212,170,.3); background: rgba(0,212,170,.08); }
.output-box {
  background: rgba(0,212,170,.03); border: 1px solid rgba(0,212,170,.18);
  border-radius: 4px; padding: 12px 14px; font-size: 13px; color: var(--accent2);
  word-break: break-all; line-height: 1.7; white-space: pre-wrap; min-height: 52px; user-select: text;
}
.output-box.error { color: var(--danger); background: rgba(255,77,109,.03); border-color: rgba(255,77,109,.18); }
.output-footer { display: flex; justify-content: flex-end; margin-top: 6px; }
.output-bytes { font-size: 9px; color: #2e2e52; letter-spacing: 0.06em; }

/* History */
.history-section { margin-top: 24px; }
.history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.history-title { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
.btn-clear-history {
  background: none; border: none; font-family: var(--mono); font-size: 9px;
  font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  color: #2e2e52; cursor: pointer; transition: color .15s;
}
.btn-clear-history:hover { color: var(--danger); }
.history-list { display: flex; flex-direction: column; gap: 6px; }
.history-item {
  background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
  padding: 10px 14px; display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: border-color .15s;
}
.history-item:hover { border-color: var(--border-active); }
.history-badge {
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 2px; flex-shrink: 0;
}
.history-badge.enc { color: var(--accent); background: rgba(108,99,255,.12); }
.history-badge.dec { color: var(--accent2); background: rgba(0,212,170,.1); }
.history-preview { font-size: 11px; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-time { font-size: 9px; color: #2e2e52; flex-shrink: 0; }

/* Info strip */
.info-strip { margin-top: 20px; display: flex; gap: 8px; flex-wrap: wrap; }
.info-chip {
  display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border); padding: 5px 10px; border-radius: 2px;
}
.info-chip .ic-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); }

/* Footer */
.footer { margin-top: 40px; text-align: center; font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
.footer a { color: var(--accent); text-decoration: none; opacity: .8; transition: opacity .15s; }
.footer a:hover { opacity: 1; }
.social-links { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 14px; }
.social-links a {
  display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); text-decoration: none;
  padding: 6px 14px; border: 1px solid var(--border); border-radius: 3px;
  background: var(--surface); transition: all .15s;
}
.social-links a:hover { color: var(--text); border-color: var(--border-active); background: rgba(108,99,255,.06); }

/* Toast */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2); border: 1px solid var(--border-active); border-radius: 4px;
  padding: 10px 18px; font-size: 12px; font-weight: 600; color: var(--text); letter-spacing: 0.05em;
  opacity: 0; transition: all .25s ease; pointer-events: none; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 520px) {
  .toolbar { flex-direction: column; align-items: flex-start; }
  .toolbar-right { width: 100%; justify-content: space-between; }
  .key-row { flex-direction: column; }
  .btn-gen { width: 100%; justify-content: center; padding: 10px; }
  .social-links { flex-direction: column; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="badge">aes-256-cbc</div>
    <h1>Cipher<span>.</span></h1>
    <p class="subtitle">// browser-native &middot; zero network &middot; iv:ciphertext format</p>
    <a class="byline" href="https://abubakarshaikh.dev" target="_blank" rel="noopener">abubakarshaikh.dev</a>
  </div>

  <div class="toolbar">
    <div class="mode-toggle">
      <button class="mode-btn active" onclick="setMode('decrypt')" id="btn-decrypt">Decrypt</button>
      <button class="mode-btn" onclick="setMode('encrypt')" id="btn-encrypt">Encrypt</button>
    </div>
    <div class="toolbar-right">
      <div class="encoding-toggle">
        <button class="enc-btn active" onclick="setEncoding('hex')" id="enc-hex">Hex</button>
        <button class="enc-btn" onclick="setEncoding('base64')" id="enc-b64">Base64</button>
      </div>
      <button class="btn-clear" onclick="clearAll()">&#x232B; Clear</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="dot dot-red"></span>
      <span class="dot dot-yellow"></span>
      <span class="dot dot-green"></span>
      <span style="margin-left:6px" id="mode-label">Decrypt ciphertext</span>
    </div>

    <div class="field-group">

      <div class="field">
        <label>
          Secret Key (hex)
          <span class="hint">// 64 hex chars = 32 bytes = AES-256</span>
        </label>
        <div class="key-row">
          <div class="key-wrapper">
            <input
              type="password"
              id="key-input"
              placeholder="e.g. 4a7c3f2e1b9d..."
              spellcheck="false"
              autocomplete="off"
              oninput="validateKey(this.value)"
            />
            <span class="key-status" id="key-status"></span>
            <button class="key-eye" onclick="toggleKeyVisibility()" id="eye-btn" title="Show/hide key" type="button">
              <svg id="eye-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <button class="btn-gen" onclick="generateKey()" title="Generate a random 256-bit key" type="button">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Gen Key
          </button>
        </div>
      </div>

      <div class="field">
        <label id="input-label">Ciphertext <span class="hint">// iv_hex:encrypted_hex</span></label>
        <div class="textarea-wrapper">
          <textarea
            id="text-input"
            placeholder="a1b2c3...:d4e5f6..."
            spellcheck="false"
            oninput="updateCharCount()"
          ></textarea>
          <span class="char-count" id="char-count"></span>
        </div>
      </div>

      <button class="btn-run" id="run-btn" onclick="run()" type="button">
        <div class="spinner" id="spinner"></div>
        <span class="btn-label" id="btn-label">&#9889; Run Decrypt</span>
      </button>
      <div class="shortcut-hint">Ctrl + Enter to run</div>

    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-label">output</span>
      <div class="divider-line"></div>
    </div>

    <div class="field-group">
      <div class="output-section" id="output-section">
        <div class="output-meta">
          <span class="output-label" id="output-label">Result</span>
          <div class="output-actions">
            <button class="out-btn" id="swap-btn" onclick="swapToInput()" title="Load output back as input">&#8634; Swap</button>
            <button class="out-btn" id="copy-btn" onclick="copyOutput()">Copy</button>
          </div>
        </div>
        <div class="output-box" id="output-text"></div>
        <div class="output-footer">
          <span class="output-bytes" id="output-bytes"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="history-section" id="history-section" style="display:none">
    <div class="history-header">
      <span class="history-title">Recent Operations</span>
      <button class="btn-clear-history" onclick="clearHistory()">Clear history</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

  <div class="info-strip">
    <div class="info-chip"><span class="ic-dot"></span> AES-256-CBC</div>
    <div class="info-chip"><span class="ic-dot"></span> 16-byte random IV</div>
    <div class="info-chip"><span class="ic-dot"></span> Web Crypto API</div>
    <div class="info-chip"><span class="ic-dot"></span> 100% in-browser</div>
    <div class="info-chip"><span class="ic-dot"></span> Hex &amp; Base64</div>
  </div>

  <div class="footer">
    Made by <a href="https://abubakarshaikh.dev" target="_blank" rel="noopener">Abubakar Shaikh</a>
    <div class="social-links">
      <a href="https://github.com/abubakar-shaikh-dev" target="_blank" rel="noopener noreferrer" aria-label="GitHub">

</div>

<div class="toast" id="toast"></div>

<script>
let currentMode = 'decrypt';
let currentEncoding = 'hex';
let keyVisible = false;
const MAX_HISTORY = 5;

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-decrypt').classList.toggle('active', mode === 'decrypt');
  document.getElementById('btn-encrypt').classList.toggle('active', mode === 'encrypt');
  document.getElementById('mode-label').textContent = mode === 'decrypt' ? 'Decrypt ciphertext' : 'Encrypt plaintext';
  document.getElementById('btn-label').textContent = mode === 'decrypt' ? '\u26A1 Run Decrypt' : '\u26A1 Run Encrypt';
  const hint = mode === 'decrypt'
    ? `<span class="hint">// ${currentEncoding === 'hex' ? 'iv_hex:encrypted_hex' : 'base64_iv:base64_cipher'}</span>`
    : `<span class="hint">// any plaintext string</span>`;
  document.getElementById('input-label').innerHTML = (mode === 'decrypt' ? 'Ciphertext ' : 'Plaintext ') + hint;
  document.getElementById('text-input').placeholder = mode === 'decrypt'
    ? (currentEncoding === 'hex' ? 'a1b2c3...:d4e5f6...' : 'aGVsbG8=:d4e5...')
    : 'Enter text to encrypt...';
  hideOutput();
}

function setEncoding(enc) {
  currentEncoding = enc;
  document.getElementById('enc-hex').classList.toggle('active', enc === 'hex');
  document.getElementById('enc-b64').classList.toggle('active', enc === 'base64');
  setMode(currentMode);
  hideOutput();
}

function validateKey(val) {
  const status = document.getElementById('key-status');
  if (!val) { status.textContent = ''; status.className = 'key-status'; return; }
  const valid = /^[0-9a-fA-F]{64}$/.test(val);
  status.textContent = valid ? '32B \u2713' : `${val.length}/64`;
  status.className = 'key-status ' + (valid ? 'valid' : 'invalid');
}

function toggleKeyVisibility() {
  keyVisible = !keyVisible;
  document.getElementById('key-input').type = keyVisible ? 'text' : 'password';
  document.getElementById('eye-icon').innerHTML = keyVisible
    ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
}

function generateKey() {
  const bytes = crypto.getRandomValues(new Uint8Array(32));
  const hex = Array.from(bytes).map(b => b.toString(16).padStart(2,'0')).join('');
  const input = document.getElementById('key-input');
  input.value = hex;
  input.type = keyVisible ? 'text' : 'password';
  validateKey(hex);
  showToast('New 256-bit key generated');
}

function updateCharCount() {
  const val = document.getElementById('text-input').value;
  document.getElementById('char-count').textContent = val.length > 0 ? `${val.length} chars` : '';
}

function hexToBytes(hex) {
  if (hex.length % 2 !== 0) throw new Error('Odd-length hex string — check your ciphertext');
  const arr = new Uint8Array(hex.length / 2);
  for (let i = 0; i < hex.length; i += 2)
    arr[i/2] = parseInt(hex.substr(i,2), 16);
  return arr;
}
function bytesToHex(bytes) {
  return Array.from(bytes).map(b => b.toString(16).padStart(2,'0')).join('');
}
function base64ToBytes(b64) {
  const bin = atob(b64);
  return new Uint8Array([...bin].map(c => c.charCodeAt(0)));
}
function bytesToBase64(bytes) {
  return btoa(String.fromCharCode(...bytes));
}

function encodeOutput(ivBytes, cipherBytes) {
  if (currentEncoding === 'hex')
    return bytesToHex(ivBytes) + ':' + bytesToHex(new Uint8Array(cipherBytes));
  return bytesToBase64(ivBytes) + ':' + bytesToBase64(new Uint8Array(cipherBytes));
}

function decodeInput(text) {
  const sep = text.indexOf(':');
  if (sep === -1) throw new Error('Invalid format — expected iv:ciphertext separated by a colon');
  const ivPart  = text.slice(0, sep);
  const encPart = text.slice(sep + 1);
  if (currentEncoding === 'hex')
    return { iv: hexToBytes(ivPart), cipher: hexToBytes(encPart) };
  return { iv: base64ToBytes(ivPart), cipher: base64ToBytes(encPart) };
}

async function getKey(hexKey) {
  const raw = hexToBytes(hexKey);
  return crypto.subtle.importKey('raw', raw, { name: 'AES-CBC' }, false, ['encrypt', 'decrypt']);
}

async function run() {
  const keyHex = document.getElementById('key-input').value.trim();
  const input  = document.getElementById('text-input').value.trim();
  if (!keyHex || !input) return showOutput('Key and input are both required.', true);
  if (!/^[0-9a-fA-F]{64}$/.test(keyHex)) return showOutput('Key must be exactly 64 hex characters (32 bytes).', true);

  setLoading(true);
  try {
    const key = await getKey(keyHex);
    if (currentMode === 'decrypt') {
      const { iv, cipher } = decodeInput(input);
      const decrypted = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, key, cipher);
      const result = new TextDecoder().decode(decrypted);
      showOutput(result, false, 'dec');
      saveHistory('dec', input, result);
    } else {
      const iv = crypto.getRandomValues(new Uint8Array(16));
      const encoded = new TextEncoder().encode(input);
      const encrypted = await crypto.subtle.encrypt({ name: 'AES-CBC', iv }, key, encoded);
      const result = encodeOutput(iv, encrypted);
      showOutput(result, false, 'enc');
      saveHistory('enc', input, result);
    }
  } catch(e) {
    const msg = (e.message && !e.message.includes('operation-specific'))
      ? e.message
      : 'Decryption failed — wrong key, corrupted ciphertext, or wrong encoding mode (try switching Hex \u2194 Base64).';
    showOutput(msg, true);
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  const btn = document.getElementById('run-btn');
  btn.disabled = on;
  btn.classList.toggle('loading', on);
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
}

function showOutput(text, isError, type) {
  const section  = document.getElementById('output-section');
  const box      = document.getElementById('output-text');
  const bytes    = document.getElementById('output-bytes');
  const swapBtn  = document.getElementById('swap-btn');
  const copyBtn  = document.getElementById('copy-btn');

  box.textContent = text;
  box.className = 'output-box' + (isError ? ' error' : '');

  if (!isError) {
    const byteLen = new TextEncoder().encode(text).length;
    bytes.textContent = `${text.length} chars \u00B7 ${byteLen} bytes`;
    swapBtn.style.display = 'inline-block';
    copyBtn.style.display = 'inline-block';
    document.getElementById('output-label').textContent =
      type === 'enc' ? 'Encrypted Output' : 'Decrypted Output';
  } else {
    bytes.textContent = '';
    swapBtn.style.display = 'none';
    copyBtn.style.display = 'none';
    document.getElementById('output-label').textContent = 'Error';
  }

  copyBtn.textContent = 'Copy';
  copyBtn.className = 'out-btn';
  section.classList.add('visible');
  setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
}

function hideOutput() {
  document.getElementById('output-section').classList.remove('visible');
}

function swapToInput() {
  const output = document.getElementById('output-text').textContent;
  if (!output) return;
  document.getElementById('text-input').value = output;
  updateCharCount();
  setMode(currentMode === 'encrypt' ? 'decrypt' : 'encrypt');
  hideOutput();
  showToast('Output loaded \u2192 mode flipped for round-trip');
  document.getElementById('text-input').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function clearAll() {
  document.getElementById('key-input').value = '';
  document.getElementById('text-input').value = '';
  document.getElementById('key-status').textContent = '';
  document.getElementById('key-status').className = 'key-status';
  document.getElementById('char-count').textContent = '';
  hideOutput();
  showToast('Cleared');
}

async function copyOutput() {
  const text = document.getElementById('output-text').textContent;
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied \u2713';
    btn.classList.add('copy-success');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copy-success'); }, 2000);
  } catch { showToast('Copy failed — select text manually'); }
}

function saveHistory(type, input, output) {
  let h = [];
  try { h = JSON.parse(sessionStorage.getItem('cipher_history') || '[]'); } catch{}
  h.unshift({ type, input: input.slice(0,60), output: output.slice(0,60), time: new Date().toLocaleTimeString() });
  if (h.length > MAX_HISTORY) h = h.slice(0, MAX_HISTORY);
  try { sessionStorage.setItem('cipher_history', JSON.stringify(h)); } catch{}
  renderHistory();
}

function renderHistory() {
  let h = [];
  try { h = JSON.parse(sessionStorage.getItem('cipher_history') || '[]'); } catch{}
  const section = document.getElementById('history-section');
  const list    = document.getElementById('history-list');
  if (!h.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = h.map((item,i) => `
    <div class="history-item" onclick="loadHistory(${i})" title="Click to load input">
      <span class="history-badge ${item.type}">${item.type === 'enc' ? 'ENC' : 'DEC'}</span>
      <span class="history-preview">${item.input.replace(/</g,'&lt;')}</span>
      <span class="history-time">${item.time}</span>
    </div>
  `).join('');
}

function loadHistory(i) {
  let h = [];
  try { h = JSON.parse(sessionStorage.getItem('cipher_history') || '[]'); } catch{}
  const item = h[i];
  if (!item) return;
  document.getElementById('text-input').value = item.input;
  updateCharCount();
  showToast('Loaded from history');
}

function clearHistory() {
  try { sessionStorage.removeItem('cipher_history'); } catch{}
  renderHistory();
  showToast('History cleared');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') run();
});

renderHistory();
</script>
