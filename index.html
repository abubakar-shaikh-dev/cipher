<style>
  :root {
    --bg: #0a0a0f;
    --surface: #0f0f1a;
    --border: #1e1e35;
    --border-active: #3d3d6b;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --danger: #ff4d6d;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --success: #00d4aa;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
    position: relative;
    overflow-x: hidden;
  }

  /* Grid background */

    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow blobs */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(108,99,255,0.06) 0%, transparent 70%);
    top: -200px; left: -200px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 760px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    margin-bottom: 48px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent2);
    background: rgba(0,212,170,0.08);
    border: 1px solid rgba(0,212,170,0.2);
    padding: 4px 10px;
    border-radius: 2px;
    margin-bottom: 16px;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  h1 {
    font-family: var(--sans);
    font-size: clamp(26px, 4vw, 38px);
    font-weight: 800;
    line-height: 1.1;
    color: var(--text);

  h1 span {

  /* Mode toggle */

    display: flex;
    background: var(--surface);

    color: #3a3a5a;

    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;

    font-family: var(--mono);

  .social-links a:hover {

</style>

<script>
  let currentMode = 'decrypt';

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('btn-decrypt').classList.toggle('active', mode === 'decrypt');
    document.getElementById('btn-encrypt').classList.toggle('active', mode === 'encrypt');

    const label = mode === 'decrypt' ? 'Decrypt ciphertext' : 'Encrypt plaintext';
    document.getElementById('mode-label').textContent = label;
    document.getElementById('run-btn').textContent = mode === 'decrypt' ? '⚡ Run Decrypt' : '⚡ Run Encrypt';

    const inputLabel = document.getElementById('input-label');
    const inputHint = mode === 'decrypt'
      ? '<span class="hint">// iv_hex:encrypted_hex</span>'
      : '<span class="hint">// any plaintext string</span>';
    inputLabel.innerHTML = (mode === 'decrypt' ? 'Ciphertext ' : 'Plaintext ') + inputHint;

    document.getElementById('text-input').placeholder = mode === 'decrypt'
      ? 'a1b2c3...:d4e5f6...'
      : 'Enter text to encrypt...';

    hideOutput();
  }

  function validateKey(val) {
    const status = document.getElementById('key-status');
    if (!val) { status.textContent = ''; status.className = 'key-status'; return; }
    const valid = /^[0-9a-fA-F]{64}$/.test(val);
    status.textContent = valid ? '32B ✓' : 'invalid';
    status.className = 'key-status ' + (valid ? 'valid' : 'invalid');
  }

  function hexToBytes(hex) {
    const arr = new Uint8Array(hex.length / 2);
    for (let i = 0; i < hex.length; i += 2) {
      arr[i / 2] = parseInt(hex.substr(i, 2), 16);
    }
    return arr;
  }

  function bytesToHex(bytes) {
    return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function getKey(hexKey) {
    const raw = hexToBytes(hexKey);
    return crypto.subtle.importKey('raw', raw, { name: 'AES-CBC' }, false, ['encrypt', 'decrypt']);
  }

  async function run() {
    const keyHex = document.getElementById('key-input').value.trim();
    const input = document.getElementById('text-input').value.trim();

    if (!keyHex || !input) return showOutput('Missing key or input.', true);
    if (!/^[0-9a-fA-F]{64}$/.test(keyHex)) return showOutput('Key must be exactly 64 hex characters (32 bytes).', true);

    try {
      const key = await getKey(keyHex);

      if (currentMode === 'decrypt') {
        const parts = input.split(':');
        if (parts.length < 2) return showOutput('Invalid format. Expected iv_hex:ciphertext_hex', true);

        const iv = hexToBytes(parts.shift());
        const cipherBytes = hexToBytes(parts.join(':'));

        const decrypted = await crypto.subtle.decrypt(
          { name: 'AES-CBC', iv },
          key,
          cipherBytes
        );

        const result = new TextDecoder().decode(decrypted);
        showOutput(result, false);

      } else {
        const iv = crypto.getRandomValues(new Uint8Array(16));
        const encoded = new TextEncoder().encode(input);

        const encrypted = await crypto.subtle.encrypt(
          { name: 'AES-CBC', iv },
          key,
          encoded
        );

        const result = bytesToHex(iv) + ':' + bytesToHex(new Uint8Array(encrypted));
        showOutput(result, false);
      }

    } catch (e) {
      showOutput('Failed: ' + (e.message || 'Wrong key or corrupted ciphertext.'), true);
    }
  }

  function showOutput(text, isError) {
    const section = document.getElementById('output-section');
    const box = document.getElementById('output-text');
    box.textContent = text;
    box.className = 'output-text' + (isError ? ' error' : '');
    section.classList.add('visible');
    document.getElementById('copy-btn').style.display = isError ? 'none' : 'block';
    document.getElementById('copy-btn').textContent = 'Copy';
    document.getElementById('copy-btn').className = 'copy-btn';
    setTimeout(() => {
      section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }

  function hideOutput() {
    document.getElementById('output-section').classList.remove('visible');
  }

  async function copyOutput() {
    const text = document.getElementById('output-text').textContent;
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') run();
  });
</script>
</body>
</html>
